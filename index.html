<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fffdf9;
      font-family: Arial, sans-serif;
      color: #7b2c2c;
    }

    .countdown {
      text-align: center;
      font-size: 40px;
      font-weight: 300;
    }
  </style>
</head>

<body>
  <div class="countdown">
    Our Wedding<br>
    <span id="timer"></span>
  </div>

  <script>
    const weddingDate = new Date("July 24, 2027 00:00:00").getTime();

    const x = setInterval(function () {
      const now = new Date().getTime();
      const distance = weddingDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));

      document.getElementById("timer").innerHTML = days + " days";

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("timer").innerHTML = "Today ❤️";
      }
    }, 1000);
  </script>
</body>
</html>
