<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fffdf9;
    font-family: Georgia, serif;
    color: #7b2c2c;
  }

  .countdown {
    display: flex;
    gap: 30px;
    text-align: center;
    font-weight: 300;
  }

  .box {
    min-width: 80px;
  }

  .num {
    font-size: 48px;
    letter-spacing: 1px;
  }

  .label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 5px;
  }
</style>
</head>

<body>

<div class="countdown">
  <div class="box">
    <div class="num" id="days">0</div>
    <div class="label">Days</div>
  </div>

  <div class="box">
    <div class="num" id="hours">0</div>
    <div class="label">Hours</div>
  </div>

  <div class="box">
    <div class="num" id="minutes">0</div>
    <div class="label">Minutes</div>
  </div>

  <div class="box">
    <div class="num" id="seconds">0</div>
    <div class="label">Seconds</div>
  </div>
</div>

<script>
  // FIXED: explicit UTC-safe date
  const weddingDate = new Date(Date.UTC(2027, 6, 24, 0, 0, 0)).getTime();
  // NOTE: month is 0-indexed → 6 = July

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = weddingDate - now;

    const seconds = Math.floor((diff / 1000) % 60);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>

</body>
</html>
